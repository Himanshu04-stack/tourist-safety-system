<!DOCTYPE html>
<html>
<head><title>Dashboard WebSocket Test</title></head>
<body>
<h2>Police Dashboard — Live Alerts</h2>
<div id="status" style="color:orange">
    Connecting...</div>
<div id="alerts" style="font-family:monospace;
    margin-top:20px"></div>
<script>
    const ws = new WebSocket(
        'ws://localhost:8080/ws/dashboard');

    ws.onopen = () => {
        document.getElementById('status')
            .style.color = 'green';
        document.getElementById('status')
            .textContent = 'Connected to server';
    };

    ws.onmessage = (event) => {
        const alert = JSON.parse(event.data);
        const div = document.createElement('div');
        div.style.background =
            alert.severity === 'CRITICAL'
                ? '#ffebee' : '#fff3e0';
        div.style.padding = '10px';
        div.style.margin = '5px 0';
        div.style.borderLeft =
            alert.severity === 'CRITICAL'
                ? '4px solid red' : '4px solid orange';
        div.innerHTML =
            '<strong>' + alert.alertType + '</strong> — '
            + alert.description
            + ' <br>Tourist: ' + alert.touristId
            + ' | Severity: ' + alert.severity;
        document.getElementById('alerts')
            .prepend(div);
    };

    ws.onclose = () => {
        document.getElementById('status')
            .textContent = 'Disconnected';
        document.getElementById('status')
            .style.color = 'red';
    };
</script>
</body>
</html>
